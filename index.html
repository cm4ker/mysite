<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Алексей Иванов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: "Inter", system-ui, -apple-system, sans-serif;

    /* light */
    --bg:        #f7f5f0;
    --fg:        #2b2a26;
    --fg-dim:    #6b6a63;
    --fg-faint:  #aeac9f;
    --rule:      #e3dfd2;
    --accent:    oklch(58% 0.13 250);
    --selection: oklch(85% 0.06 250);
  }
  html[data-theme="dark"] {
    --bg:        #16161a;
    --fg:        #d8d6cf;
    --fg-dim:    #8b8a82;
    --fg-faint:  #4d4d48;
    --rule:      #26262c;
    --accent:    oklch(72% 0.13 250);
    --selection: oklch(35% 0.08 250);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--selection); }

  /* ============ Layout ============ */
  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 88px 32px 160px;
  }

  /* ---- Top bar (super minimal) ---- */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-dim);
    margin-bottom: 64px;
  }
  .top a, .top button {
    color: var(--fg-dim);
    text-decoration: none;
    background: none;
    border: 0;
    font: inherit;
    cursor: pointer;
    padding: 0;
  }
  .top a:hover, .top button:hover { color: var(--fg); }
  .top .left { display: flex; gap: 18px; }

  /* ---- Header (home) ---- */
  .header h1 {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.01em;
    margin: 0 0 14px;
  }
  .header p {
    color: var(--fg-dim);
    margin: 0 0 8px;
    max-width: 56ch;
    text-wrap: pretty;
  }
  .contacts {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--fg-dim);
    margin-top: 18px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }
  .contacts a {
    color: var(--fg-dim);
    text-decoration: none;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 1px;
  }
  .contacts a:hover { color: var(--fg); border-bottom-color: var(--fg); }

  /* ---- Posts list ---- */
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-faint);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin: 80px 0 14px;
  }

  .filters {
    display: flex;
    gap: 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-faint);
    margin: 0 0 6px;
    flex-wrap: wrap;
  }
  .filters button {
    background: none;
    border: 0;
    padding: 0;
    font: inherit;
    color: var(--fg-faint);
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .filters button:hover { color: var(--fg); }
  .filters button.active { color: var(--fg); }

  .entry-row {
    display: grid;
    grid-template-columns: 132px 1fr auto;
    gap: 20px;
    padding: 14px 0;
    border-top: 1px solid var(--rule);
    align-items: baseline;
  }
  .entry-row.is-link { cursor: pointer; }
  .entry-list .entry-row:last-child { border-bottom: 1px solid var(--rule); }
  .entry-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-faint);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .entry-title {
    font-size: 15px;
    color: var(--fg);
    transition: color 0.12s ease;
  }
  .entry-row.is-link:hover .entry-title { color: var(--accent); }
  .entry-sub {
    color: var(--fg-dim);
    font-size: 13px;
    margin-top: 2px;
  }
  .entry-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-faint);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .entry-arrow {
    color: var(--fg-faint);
    font-family: var(--mono);
    font-size: 12px;
    margin-left: 6px;

  .entry-list { list-style: none; padding: 0; margin: 0; }
  .empty-state {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-faint);
    padding: 24px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }

  /* ---- Calendar ---- */
  .cal-wrap {
    margin: 64px 0 0;
  }
  .cal-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-faint);
    letter-spacing: 0.04em;
    margin-bottom: 12px;
  }
  .cal-head .y { letter-spacing: 0.16em; text-transform: uppercase; }
  .cal-nav {
    display: inline-flex;
    align-items: baseline;
    gap: 10px;
  }
  .cal-nav button {
    background: none;
    border: 0;
    padding: 0 2px;
    font: inherit;
    color: var(--fg-faint);
    cursor: pointer;
    letter-spacing: 0;
  }
  .cal-nav button:hover:not(:disabled) { color: var(--fg); }
  .cal-nav button:disabled { opacity: 0.3; cursor: default; }
  .calendar {
    padding-bottom: 4px;
  }
  .cal-svg { display: block; width: 100%; height: auto; }
  .cal-svg .cal-month {
    font-family: var(--mono);
    font-size: 9px;
    fill: var(--fg-faint);
    letter-spacing: 0.04em;
  }
  .cal-svg .cal-rect {
    fill: var(--rule);
    transition: fill 0.1s ease;
  }
  .cal-svg .cal-rect.has-post {
    fill: var(--accent);
    cursor: pointer;
  }
  .cal-svg .cal-rect.has-post:hover {
    fill: var(--fg);
  }


  /* ---- Article ---- */
  .back {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-dim);
    text-decoration: none;
    display: inline-block;
    margin-bottom: 48px;

  .back:hover { color: var(--fg); }

  .article-meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-faint);
    letter-spacing: 0.04em;
    margin-bottom: 18px;

    gap: 14px;

  .article-title {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 28px;
    line-height: 1.2;
    letter-spacing: -0.012em;
    margin: 0 0 40px;
    text-wrap: balance;
  }
  .prose {
    font-size: 15.5px;
    line-height: 1.72;
    color: var(--fg);
  }
  .prose p { margin: 0 0 1.1em; }
  .prose h2 {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 17px;
    margin: 2em 0 0.6em;
    letter-spacing: -0.005em;
  }
  .prose a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid color-mix(in oklch, var(--accent) 35%, transparent);
  }
  .prose a:hover { border-bottom-color: var(--accent); }
  .prose code {
    font-family: var(--mono);
    font-size: 0.88em;

    padding: 1px 5px;
  }
  .prose pre {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    background: color-mix(in oklch, var(--fg) 4%, transparent);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 1.2em 0;

  .prose pre code { background: none; padding: 0; }
  .prose blockquote {
    margin: 1.2em 0;
    padding-left: 18px;
    border-left: 2px solid var(--rule);
    color: var(--fg-dim);
  }
  .prose ul, .prose ol { padding-left: 22px; margin: 0 0 1.1em; }
  .prose li { margin-bottom: 4px; }
  .prose hr { border: 0; border-top: 1px solid var(--rule); margin: 2.4em 0; }

  /* ---- Footer ---- */
  footer {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-faint);
    margin-top: 120px;
    letter-spacing: 0.02em;
  }

  /* ---- Mobile ---- */
  @media (max-width: 600px) {
    .page { padding: 56px 22px 100px; }
    .entry-row { grid-template-columns: 1fr auto; }
    .entry-date {
      grid-column: 1 / -1;
      margin-bottom: 2px;
    }
    .article-title { font-size: 24px; }
  }
</style>

<script>
/* ============================================================
   Контент. Чтобы добавить запись — добавь объект в `entries`.
   Типы:
     { type: "article", slug, title, date, body }   — статья (markdown)
     { type: "talk",    title, date, venue, url? } — выступление
     { type: "work",    title, company, date, until? } — работа (until: null = сейчас)
   Markdown: # ## **bold** `code` ```блок``` > цитата - список [t](url)
   ============================================================ */

const profile = {
  name: "Алексей Иванов",
  bio: "Инженер. Пишу про код, продукт и привычки. Этот сайт — мой блокнот в открытую.",
  email: "hi@example.com",
  github: "github.com/alexey",
  twitter: null,
};

const entries = [
  {
    type: "article",
    slug: "hello-world",
    title: "Hello, world",
    date: "2026-05-08",
    body: `Это первая запись на новом сайте. Я долго откладывал, потому что хотел "идеальный" движок — статика, RSS, теги, чёрная и светлая тема, поиск. В итоге всё это получилось из одного HTML-файла.

## Зачем

Мне нужно место, куда я могу записать мысль за пять минут и не настраивать ничего. Не CMS, не SaaS. Просто файл, который я открываю в редакторе, дописываю в массив и коммичу.

## Как добавить запись

Открой исходник и найди массив \`entries\`. У каждой записи есть \`type\`: \`article\`, \`talk\` или \`work\`. Сохрани файл — она появится в списке.`
  },
  {
    type: "article",
    slug: "writing-as-debugging",
    title: "Письмо как отладка",
    date: "2026-04-22",
    body: `Когда я пытаюсь объяснить идею вслух, я часто застреваю на третьем предложении. Это не проблема речи — это проблема того, что идея ещё не дописана.

Письмо — это компилятор для мысли. Туманный набросок не проходит проверку: остаются только связные куски.

## Правило одного абзаца

Если не получается уложить мысль в один абзац, значит, в ней спрятаны две. Разделяй и проверяй каждую отдельно.

> Хорошая статья — это последовательность абзацев, каждый из которых выживает в одиночку.

## Что я делаю на практике

- пишу драфт за один присест, не оглядываясь
- кладу его на сутки
- читаю вслух и вычёркиваю всё, что не звучит
- если осталось меньше половины — это нормально`
  },
  {
    type: "article",
    slug: "small-tools",
    title: "Маленькие инструменты",
    date: "2026-03-15",
    body: `Лучшие инструменты, которыми я пользуюсь, помещаются в одну команду или один файл. Не потому что я аскет, а потому что у маленьких вещей меньше способов сломаться.

## Примеры из моего dotfiles

- скрипт \`n\` — открывает заметку дня в редакторе
- \`tt\` — таймер на 25 минут с уведомлением
- одна страница HTML вместо блог-движка (вы её сейчас читаете)

Каждый из них — десятки строк, ноль зависимостей. За три года ни один не сломался.`
  },
  {
    type: "talk",
    title: "Маленькие инструменты на каждый день",
    date: "2026-02-12",
    venue: "DevConf 2026",
    url: "https://example.com/talk"
  },
  {
    type: "talk",
    title: "Как я пишу: процесс и инструменты",
    date: "2025-11-04",
    venue: "Saint HighLoad++"
  },
  {
    type: "work",
    title: "Senior Engineer",
    company: "Acme Inc.",
    date: "2024-09-01",
    until: null
  },
  {
    type: "work",
    title: "Engineer",
    company: "Бывшая компания",
    date: "2021-03-15",
    until: "2024-08-31"
  },
];

/* ============================================================
   Routing + rendering
   ============================================================ */

const view = document.getElementById("view");
const themeBtn = document.getElementById("themeBtn");

function fmtDate(iso) {
  const [y, m, d] = iso.split("-");
  return `${y}.${m}.${d}`;
}
function escapeHtml(s) {
  return s.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}
function renderInline(s) {
  s = escapeHtml(s);
  s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  return s;
}
function renderMarkdown(src) {
  const lines = src.split("\n");
  let out = "", i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith("```")) {
      let buf = ""; i++;
      while (i < lines.length && !lines[i].startsWith("```")) { buf += lines[i] + "\n"; i++; }
      i++;
      out += `<pre><code>${escapeHtml(buf.replace(/\\`/g, "`"))}</code></pre>`;
      continue;
    }
    if (/^##\s+/.test(line)) { out += `<h2>${renderInline(line.replace(/^##\s+/, ""))}</h2>`; i++; continue; }
    if (/^#\s+/.test(line))  { out += `<h1>${renderInline(line.replace(/^#\s+/,  ""))}</h1>`; i++; continue; }
    if (/^>\s?/.test(line)) {
      const buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^>\s?/, "")); i++; }
      out += `<blockquote>${buf.map(renderInline).join("<br>")}</blockquote>`;
      continue;
    }
    if (/^-\s+/.test(line)) {
      const buf = [];
      while (i < lines.length && /^-\s+/.test(lines[i])) { buf.push(lines[i].replace(/^-\s+/, "")); i++; }
      out += `<ul>${buf.map(b => `<li>${renderInline(b)}</li>`).join("")}</ul>`;
      continue;
    }
    if (line.trim() === "") { i++; continue; }
    const buf = [line]; i++;
    while (i < lines.length && lines[i].trim() !== "" && !/^(#|>|-|```)/.test(lines[i])) {
      buf.push(lines[i]); i++;
    }
    out += `<p>${buf.map(renderInline).join("<br>")}</p>`;
  }
  return out;
}

let currentCalYear = new Date().getFullYear();
let activeFilter = "all"; // all | article | talk | work

const TYPE_LABEL = { article: "статья", talk: "выступление", work: "работа" };

function pluralize(n, forms) {
  const n10 = n % 10, n100 = n % 100;
  if (n10 === 1 && n100 !== 11) return forms[0];
  if (n10 >= 2 && n10 <= 4 && (n100 < 12 || n100 > 14)) return forms[1];
  return forms[2];
}

function renderCalendar() {
  const year = currentCalYear;
  const start = new Date(year, 0, 1);
  start.setDate(start.getDate() - start.getDay()); // back to Sunday
  const end = new Date(year, 11, 31);

  const cell = 10, gap = 2, stride = cell + gap;
  const cols = 53, rows = 7, mh = 16;
  const w = cols * stride;
  const h = mh + rows * stride;

  const byDate = {};
  entries.forEach(p => {
    if (!p.date) return;
    (byDate[p.date] = byDate[p.date] || []).push(p);
  });

  const months = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];

  let cells = "";
  let postCount = 0;
  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < 7; r++) {
      const d = new Date(start);
      d.setDate(start.getDate() + c * 7 + r);
      if (d.getFullYear() !== year) continue;
      const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      const items = byDate[iso];
      const x = c * stride;
      const y = mh + r * stride;
      if (items) postCount += items.length;
      const cls = items ? "cal-rect has-post" : "cal-rect";
      let routeAttr = "";
      if (items) {
        const art = items.find(it => it.type === "article");
        const talk = items.find(it => it.type === "talk" && it.url);
        if (art) routeAttr = ` data-slug="${art.slug}"`;
        else if (talk) routeAttr = ` data-href="${talk.url}"`;
      }
      const tip = items ? items.map(it => `${iso} — ${it.title}`).join("\n") : iso;
      cells += `<rect x="${x}" y="${y}" width="${cell}" height="${cell}" rx="2" class="${cls}"${routeAttr}><title>${escapeHtml(tip)}</title></rect>`;
    }
  }

  let labels = "";
  for (let m = 0; m < 12; m++) {
    const d = new Date(year, m, 1);
    const diff = Math.floor((d - start) / 86400000);
    const col = Math.floor(diff / 7);
    labels += `<text x="${col * stride}" y="10" class="cal-month">${months[m]}</text>`;
  }

  const summary = `${postCount} ${pluralize(postCount, ["запись","записи","записей"])}`;

  const years = entries.map(p => parseInt(p.date.slice(0, 4), 10));
  const minYear = Math.min(...years, new Date().getFullYear());
  const maxYear = new Date().getFullYear();
  const prevDis = year <= minYear ? "disabled" : "";
  const nextDis = year >= maxYear ? "disabled" : "";

  return `
    <div class="cal-wrap">
      <div class="cal-head">
        <span class="cal-nav">
          <button data-year-step="-1" ${prevDis} aria-label="Предыдущий год">←</button>
          <span class="y">${year}</span>
          <button data-year-step="1" ${nextDis} aria-label="Следующий год">→</button>
        </span>
        <span>${summary}</span>
      </div>
      <div class="calendar">
        <svg class="cal-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMinYMid meet" xmlns="http://www.w3.org/2000/svg">
          ${labels}
          ${cells}
        </svg>
      </div>
    </div>
  `;
}

function fmtMonth(iso) {
  const [y, m] = iso.split("-");
  return `${y}.${m}`;
}
function renderEntryRow(e) {
  const tag = `<span class="entry-tag">${TYPE_LABEL[e.type]}</span>`;
  if (e.type === "article") {
    return `<li class="entry-row is-link" data-slug="${e.slug}">
      <span class="entry-date">${fmtDate(e.date)}</span>
      <span><span class="entry-title">${escapeHtml(e.title)}</span></span>
      ${tag}
    </li>`;
  }
  if (e.type === "talk") {
    const linkable = !!e.url;
    const arrow = linkable ? `<span class="entry-arrow">↗</span>` : "";
    return `<li class="entry-row${linkable ? " is-link" : ""}"${linkable ? ` data-href="${e.url}"` : ""}>
      <span class="entry-date">${fmtDate(e.date)}</span>
      <span>
        <span class="entry-title">${escapeHtml(e.title)}${arrow}</span>
        <div class="entry-sub">${escapeHtml(e.venue || "")}</div>
      </span>
      ${tag}
    </li>`;
  }
  if (e.type === "work") {
    const period = `${fmtMonth(e.date)} — ${e.until ? fmtMonth(e.until) : "сейчас"}`;
    return `<li class="entry-row">
      <span class="entry-date">${period}</span>
      <span>
        <span class="entry-title">${escapeHtml(e.title)}</span>
        <div class="entry-sub">${escapeHtml(e.company || "")}</div>
      </span>
      ${tag}
    </li>`;
  }
  return "";
}

function renderHome() {
  const filtered = activeFilter === "all"
    ? entries.slice()
    : entries.filter(e => e.type === activeFilter);
  filtered.sort((a, b) => b.date.localeCompare(a.date));
  const list = filtered.length
    ? filtered.map(renderEntryRow).join("")
    : "";
  const listMarkup = filtered.length
    ? `<ul class="entry-list">${list}</ul>`
    : `<div class="empty-state">Пока ничего нет.</div>`;

  const filterDef = [
    ["all", "все"],
    ["article", "статьи"],
    ["talk", "выступления"],
    ["work", "работа"],
  ];
  const filtersMarkup = filterDef.map(([k, label]) =>
    `<button data-filter="${k}"${activeFilter === k ? ' class="active"' : ""}>${label}</button>`
  ).join("");

  const contactBits = [];
  if (profile.email)   contactBits.push(`<a href="mailto:${profile.email}">${profile.email}</a>`);
  if (profile.github)  contactBits.push(`<a href="https://${profile.github}" target="_blank" rel="noopener">${profile.github}</a>`);
  if (profile.twitter) contactBits.push(`<a href="https://twitter.com/${profile.twitter}" target="_blank" rel="noopener">@${profile.twitter}</a>`);

  view.innerHTML = `
    <section class="header">
      <h1>${escapeHtml(profile.name)}</h1>
      <p>${escapeHtml(profile.bio)}</p>
      <div class="contacts">${contactBits.join("")}</div>
    </section>
    ${renderCalendar()}
    <div class="section-label">Записи</div>
    <div class="filters">${filtersMarkup}</div>
    ${listMarkup}
  `;
  document.title = profile.name;
}

function renderPost(slug) {
  const p = entries.find((x) => x.type === "article" && x.slug === slug);
  if (!p) {
    view.innerHTML = `<a class="back" href="#/">← назад</a><p>Статья не найдена.</p>`;
    return;
  }
  view.innerHTML = `
    <a class="back" href="#/">← назад</a>
    <div class="article-meta">
      <span>${fmtDate(p.date)}</span>
      <span>статья</span>
    </div>
    <h1 class="article-title">${escapeHtml(p.title)}</h1>
    <div class="prose">${renderMarkdown(p.body)}</div>
  `;
  document.title = p.title + " — " + profile.name;
}

function route() {
  const h = location.hash.replace(/^#\/?/, "");
  if (h.startsWith("p/")) renderPost(h.slice(2));
  else renderHome();
  window.scrollTo(0, 0);
}

view.addEventListener("click", (e) => {
  const yearBtn = e.target.closest("[data-year-step]");
  if (yearBtn && !yearBtn.disabled) {
    currentCalYear += parseInt(yearBtn.dataset.yearStep, 10);
    renderHome();
    return;
  }
  const filterBtn = e.target.closest("[data-filter]");
  if (filterBtn) {
    activeFilter = filterBtn.dataset.filter;
    renderHome();
    return;
  }
  const hrefEl = e.target.closest("[data-href]");
  if (hrefEl) { window.open(hrefEl.dataset.href, "_blank", "noopener"); return; }
  const slugEl = e.target.closest("[data-slug]");
  if (slugEl) { location.hash = "#/p/" + slugEl.dataset.slug; return; }
});
window.addEventListener("hashchange", route);

/* theme */
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  themeBtn.textContent = t;
  localStorage.setItem("mysite-theme", t);
}
themeBtn.addEventListener("click", () => {
  const cur = document.documentElement.dataset.theme || "light";
  applyTheme(cur === "light" ? "dark" : "light");
});
applyTheme(localStorage.getItem("mysite-theme") || "light");

route();
</script>
</body>
</html>
